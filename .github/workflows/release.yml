name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  BuildRelease:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      ZL_BUILD_TYPE: RELEASE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Release ${{ matrix.arch }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleRelease -Darch=${{ matrix.arch }}

      - name: Upload Release ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-Release-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  PublishRelease:
    needs: BuildRelease
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zalith Launcher ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*.apk
          generate_release_notes: true
