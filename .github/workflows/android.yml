name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  BuildRelease:
    if: github.repository_owner == 'ActuallyTrizon' && !startsWith(github.ref, 'refs/pull/') && github.ref_name == 'main'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6.0.3

      - name: Set build type
        id: set-env
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BUILD_TYPE="DEBUG"

          if [[ "$COMMIT_MSG" == *"pre-release"* ]]; then
            BUILD_TYPE="PRE_RELEASE"
          elif [[ "$COMMIT_MSG" == *"release"* ]]; then
            BUILD_TYPE="RELEASE"
          fi

          echo "ZL_BUILD_TYPE=${BUILD_TYPE}" >> $GITHUB_ENV

      # Speeds up your compilation by caching dependencies
      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      # Bulletproof keystore creation without finicky terminal scripts
      - name: Inject Keystore File
        id: write_file
        uses: timheuer/base64-to-file@v2.0.0
        with:
          fileName: 'trizon.jks'
          fileDir: './ZalithLauncher/'
          encodedString: ${{ secrets.SIGNING_KEY }}

      - name: Build and Sign Release ${{ matrix.arch }}
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: "tri"
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleRelease -Darch=${{ matrix.arch }}

      - name: Upload Release ${{ matrix.arch }}
        continue-on-error: true
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ZalithLauncher(Release) ${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/release/*

  BuildDebug:
    if: startsWith(github.ref, 'refs/pull/') || github.ref_name != 'main'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Debug ${{ matrix.arch }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }}

      - name: Upload Debug ${{ matrix.arch }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ZalithLauncher(Debug) ${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*
